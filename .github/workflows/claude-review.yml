name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Assets/Scripts/**'
      - 'Assets/Shaders/**'
      - 'Packages/**'
      - '!**/*.generated.cs'
      - '!**/*.md'

# 同一PRへの連続pushで古い実行をキャンセル
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # fork PRからの実行を防ぐ
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 暴走防止
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff計算のため履歴全体を取得

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # CLAUDE.md をClaudeが読む前提のため prompt は最小限にする
          prompt: |
            CLAUDE.md の指針に従い、このPRの変更内容をレビューしてください。
            問題があれば該当ファイルの行にインラインコメントを投稿してください。
          claude_args: |
            --max-turns 10
            --model claude-opus-4-8
