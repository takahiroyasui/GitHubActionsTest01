name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'Assets/Scripts/**'
      - 'Assets/Shaders/**'
      - 'Packages/**'
      - '!**/*.generated.cs'
      - '!**/*.md'

# 同一PRへの連続pushで古い実行をキャンセル
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # fork PRからの実行を防ぐ
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 暴走防止
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # diff計算のため履歴全体を取得

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # CLAUDE.md をClaudeが読む前提のため prompt は最小限にする
          prompt: |
            このPRの変更差分のみをレビュー対象とし、CLAUDE.md の指針に従って
            重要度の高い指摘を最大5件まで、該当行へのインラインコメントで投稿してください。
            リポジトリ全体の探索は行わず、変更されたファイルのみ確認してください。
          claude_args: |
            --max-turns 25
            --model claude-opus-4-7
